name: CI

on:
  push:
  pull_request:

jobs:
  python_quality:
    name: Python quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check

      - name: File length cap
        run: uv run python scripts/check_file_length.py

      - name: Type check (mypy)
        run: uv run mypy

      - name: Dead code (vulture)
        run: uv run vulture

  python_tests:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests with coverage
        run: uv run pytest --cov --cov-report= --cov-fail-under=0

      - name: Check Python coverage
        run: uv run coverage report

  frontend_tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node 20 to match the Dockerfile's frontend build stage.
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Frontend tests (vitest)
        run: npm test
        working-directory: frontend

  browser_e2e:
    name: Browser E2E tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install Python dependencies
        run: uv sync --extra dev

      # Node 20 to match the Dockerfile's frontend build stage.
      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
        working-directory: frontend

      - name: Browser E2E tests
        run: npm run test:e2e
        working-directory: frontend

      - name: Upload browser-test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            frontend/playwright-report/
            frontend/test-results/
          if-no-files-found: ignore

  check:
    if: ${{ always() }}
    needs:
      - python_quality
      - python_tests
      - frontend_tests
      - browser_e2e
    runs-on: ubuntu-latest
    steps:
      - name: Verify all checks passed
        env:
          PYTHON_QUALITY_RESULT: ${{ needs.python_quality.result }}
          PYTHON_TESTS_RESULT: ${{ needs.python_tests.result }}
          FRONTEND_TESTS_RESULT: ${{ needs.frontend_tests.result }}
          BROWSER_E2E_RESULT: ${{ needs.browser_e2e.result }}
        run: |
          for check_result in \
            "$PYTHON_QUALITY_RESULT" \
            "$PYTHON_TESTS_RESULT" \
            "$FRONTEND_TESTS_RESULT" \
            "$BROWSER_E2E_RESULT"
          do
            test "$check_result" = "success" || exit 1
          done

  docker:
    name: Build & push image
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only same-repo pushes get a writable token; PRs (incl. forks) just build.
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
