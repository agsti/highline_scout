# Run `pre-commit install` once to enable. Both hooks are local hooks run
# through uv so they see the project's real dependencies and type stubs, which
# mypy's strict mode needs to resolve imports.
repos:
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check --force-exclude
        language: system
        types: [python]
        require_serial: true

      - id: file-length
        name: file length (<=500 lines)
        entry: uv run python scripts/check_file_length.py
        language: system
        types: [python]

      - id: mypy
        name: mypy
        entry: uv run mypy
        language: system
        types: [python]
        pass_filenames: false
